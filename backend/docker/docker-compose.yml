name: appifylab-backend
services:
  app:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
    image: appifylab-backend-image
    container_name: appifylab-backend-container
    restart: no
    volumes:
      - ./nginx/default.conf:/etc/nginx/sites-available/default
      - ../codes:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
      - ./docker/php/local.ini:/etc/php/8.4/fpm/conf.d/99-local.ini
      - ./docker/php/local.ini:/etc/php/8.4/cli/conf.d/99-local.ini
    depends_on:
      - mysql
      - redis
    ports:
      - "8830:80"
    networks:
      - default
    extra_hosts:
      - "host.docker.internal:host-gateway"
  mysql:
    image: mysql:8.0
    container_name: appifylab-mysql-container
    restart: no
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - default
  redis:
    image: redis:7.4
    container_name: appifylab-redis-container
    restart: no
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    networks:
      - default
volumes:
  mysql_data:
    driver: local

networks:
  default:
    driver: bridge
